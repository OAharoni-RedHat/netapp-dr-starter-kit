# Schedules are source-cluster only (hub creates snapshots for replication)
tridentProtect:
  snapshots:
    - name: init-boutique
      applicationRef: boutique
      appVaultRef: s3-appvault
      reclaimPolicy: Delete
    - name: init-wordpress
      applicationRef: wordpress
      appVaultRef: s3-appvault
      reclaimPolicy: Delete
  schedules:
    - name: boutique-hourly
      applicationRef: boutique
      appVaultRef: s3-appvault
      granularity: Hourly
      minute: "0"
      snapshotRetention: "24"
      backupRetention: "7"
    - name: wordpress-hourly
      applicationRef: wordpress
      appVaultRef: s3-appvault
      granularity: Hourly
      minute: "0"
      snapshotRetention: "24"
      backupRetention: "7"
# FSx endpoint IPs are dynamically discovered by fsx-endpoint-watcher CronJob.
# Only SVM names are needed here (deterministic, set by crossplane-setup).
tridentFSX:
  mgmtLIF: ""
  clusterLIF: ""
  svm: SVM1
  interclusterIPs: []
  peer:
    mgmtLIF: ""
    clusterLIF: ""
    svm: SVM2
    interclusterIPs: []
clusterGroup:
  name: hub
  argoCD:
    resourceHealthChecks:
      - kind: TridentOrchestrator
        group: trident.netapp.io
        check: |
          hs = {}
          if obj.status ~= nil and obj.status.status ~= nil then
            if obj.status.status == "Installed" then
              hs.status = "Healthy"
              hs.message = "Trident installation completed successfully."
            elseif obj.status.status == "Installing" then
              hs.status = "Progressing"
              hs.message = "Trident is currently installing."
            elseif obj.status.status == "Updating" then
              hs.status = "Progressing"
              hs.message = "Trident is currently updating."
            elseif obj.status.status == "Failed" then
              hs.status = "Degraded"
              hs.message = "Trident installation failed. Check operator logs."
            else
              hs.status = "Progressing"
              hs.message = "Trident status unknown or pending."
            end
          else
            hs.status = "Progressing"
            hs.message = "Awaiting TridentOrchestrator status."
          end
          return hs
      # Crossplane FSx: Ready=False during AWS CREATING should be Progressing, not Degraded.
      # Argo CD health Lua omits the global `string` table; use :lower() / :find() on string values.
      - kind: OntapFileSystem
        group: fsx.aws.upbound.io
        check: |
          hs = {}
          local ready = nil
          local synced = nil
          local sync_msg = ""
          local ready_msg = ""
          local ready_reason = ""
          if obj.status ~= nil and obj.status.conditions ~= nil then
            for i, c in ipairs(obj.status.conditions) do
              if c.type == "Ready" then
                ready = c.status
                ready_reason = c.reason or ""
                ready_msg = c.message or ""
              elseif c.type == "Synced" then
                synced = c.status
                sync_msg = c.message or ""
              end
            end
          end
          if synced == "False" then
            hs.status = "Degraded"
            hs.message = "Provider sync failed"
            if sync_msg ~= "" then
              hs.message = hs.message .. ": " .. sync_msg
            end
            return hs
          end
          if ready == "True" then
            hs.status = "Healthy"
            hs.message = "FSx ONTAP filesystem is ready."
            return hs
          end
          if ready == "False" then
            local r = tostring(ready_reason or "")
            local rl = r:lower()
            if rl:find("error", 1, true) ~= nil or rl:find("fail", 1, true) ~= nil then
              hs.status = "Degraded"
              hs.message = ready_msg ~= "" and ready_msg or ready_reason
              return hs
            end
            hs.status = "Progressing"
            hs.message = "FSx filesystem provisioning: " .. (ready_reason or "in progress")
            if ready_msg ~= "" then
              hs.message = hs.message .. " - " .. ready_msg
            end
            return hs
          end
          hs.status = "Progressing"
          hs.message = "Awaiting FSx OntapFileSystem status."
          return hs
      - kind: OntapStorageVirtualMachine
        group: fsx.aws.upbound.io
        check: |
          hs = {}
          local ready = nil
          local synced = nil
          local sync_msg = ""
          local ready_msg = ""
          local ready_reason = ""
          if obj.status ~= nil and obj.status.conditions ~= nil then
            for i, c in ipairs(obj.status.conditions) do
              if c.type == "Ready" then
                ready = c.status
                ready_reason = c.reason or ""
                ready_msg = c.message or ""
              elseif c.type == "Synced" then
                synced = c.status
                sync_msg = c.message or ""
              end
            end
          end
          if synced == "False" then
            hs.status = "Degraded"
            hs.message = "Provider sync failed"
            if sync_msg ~= "" then
              hs.message = hs.message .. ": " .. sync_msg
            end
            return hs
          end
          if ready == "True" then
            hs.status = "Healthy"
            hs.message = "FSx SVM is ready."
            return hs
          end
          if ready == "False" then
            local r = tostring(ready_reason or "")
            local rl = r:lower()
            if rl:find("error", 1, true) ~= nil or rl:find("fail", 1, true) ~= nil then
              hs.status = "Degraded"
              hs.message = ready_msg ~= "" and ready_msg or ready_reason
              return hs
            end
            hs.status = "Progressing"
            hs.message = "FSx SVM provisioning: " .. (ready_reason or "in progress")
            if ready_msg ~= "" then
              hs.message = hs.message .. " - " .. ready_msg
            end
            return hs
          end
          hs.status = "Progressing"
          hs.message = "Awaiting FSx OntapStorageVirtualMachine status."
          return hs
    resourceActions:
      - group: protect.trident.netapp.io
        kind: AppMirrorRelationship
        action: |
          discovery.lua: |
            actions = {}
            actions["Failover"] = {["disabled"] = true}
            actions["Resync"] = {["disabled"] = true}
            if obj.spec ~= nil and obj.spec.desiredState ~= nil then
              if obj.spec.desiredState == "Established" then
                actions["Failover"]["disabled"] = false
              elseif obj.spec.desiredState == "Promoted" then
                actions["Resync"]["disabled"] = false
              end
            end
            return actions
          definitions:
          - name: Failover
            action.lua: |
              obj.spec.desiredState = "Promoted"
              return obj
          - name: Resync
            action.lua: |
              obj.spec.desiredState = "Established"
              return obj
  # Namespace is a dictionary for easier overriding (lists are supported as well)
  namespaces:
    open-cluster-management:
    vault:
    external-secrets-operator:
      operatorGroup: true
      targetNamespaces: []
    external-secrets:
    crossplane-system:
    trident:
    trident-protect:
    openshift-cnv:
    wordpress:
    boutique:
  subscriptions:
    acm:
      name: advanced-cluster-management
      namespace: open-cluster-management
      channel: release-2.15
      # csv: advanced-cluster-management.v2.6.1
    trident:
      name: trident-operator
      namespace: openshift-operators
      channel: stable
      source: certified-operators
    eso:
      name: openshift-external-secrets-operator
      namespace: external-secrets-operator
      channel: stable-v1
  argoProjects:
    - hub
    - crossplane
    - trident
    - workload
  # Explicitly mention the cluster-state based overrides we plan to use for this pattern.
  # We can use self-referential variables because the chart calls the tpl function with these variables defined
  sharedValueFiles:
    - '/overrides/values-{{ $.Values.global.clusterPlatform }}.yaml'
    - '/overrides/values-{{ $.Values.global.clusterVersion }}-{{ $.Values.clusterGroup.name }}.yaml'
  applications:
    acm:
      name: acm
      namespace: open-cluster-management
      argoProject: hub
      chart: acm
      chartVersion: 0.1.*
    vault:
      name: vault
      namespace: vault
      argoProject: hub
      chart: hashicorp-vault
      chartVersion: 0.1.*
    openshift-external-secrets:
      name: openshift-external-secrets
      namespace: external-secrets
      argoProject: hub
      chart: openshift-external-secrets
      chartVersion: 0.0.*
    crossplane:
      name: crossplane
      namespace: crossplane-system
      argoProject: crossplane
      path: charts/all/crossplane
    crossplane-providers:
      name: crossplane-providers
      namespace: crossplane-system
      argoProject: crossplane
      path: charts/all/crossplane-providers
    crossplane-aws-infra:
      name: crossplane-aws-infra
      namespace: crossplane-system
      argoProject: crossplane
      path: charts/all/crossplane-aws-infra
      ignoreDifferences:
        - group: route53.aws.upbound.io
          kind: Record
          jqPathExpressions:
            - .spec.forProvider.healthCheckId
        - group: route53.aws.upbound.io
          kind: HealthCheck
          jqPathExpressions:
            - .spec.forProvider.enableSni
            - .spec.forProvider.tags
        - group: ec2.aws.upbound.io
          kind: VPCPeeringConnectionOptions
          jqPathExpressions:
            - .spec.managementPolicies
    dr-dns-reconciler:
      name: dr-dns-reconciler
      namespace: crossplane-system
      argoProject: crossplane
      path: charts/all/dr-dns-reconciler
      syncPolicy:
        automated:
          selfHeal: true
        retry:
          limit: 5
    trident:
      name: trident
      namespace: trident
      path: charts/all/trident
      argoProject: trident
      ignoreDifferences:
        - group: trident.netapp.io
          kind: TridentBackendConfig
          jqPathExpressions:
            - .spec.managementLIF
            - .spec.svm
            - .spec.replication
            - .metadata.annotations
    protect:
      name: trident-protect
      namespace: trident-protect
      argoProject: trident
      chart: trident-protect
      repoURL: https://netapp.github.io/trident-protect-helm-chart
      chartVersion: 100.2510.0
      ignoreDifferences:
        - kind: Secret
          name: tp-webhook-tls
          jqPathExpressions:
            - .data
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          name: trident-protect-validating-webhook-configurations
          jqPathExpressions:
            - '.webhooks[].clientConfig.caBundle'
            - '.metadata.finalizers[]'
    protect-config:
      name: trident-protect-config
      namespace: trident-protect
      argoProject: trident
      path: charts/all/trident-protect-config
      syncPolicy:
        automated:
          selfHeal: true
        retry:
          limit: 20
      ignoreDifferences:
        - group: protect.trident.netapp.io
          kind: AppMirrorRelationship
          jqPathExpressions:
            - .spec.sourceApplicationUID
            - .spec.desiredState
    wordpress:
      name: wordpress
      namespace: wordpress
      argoProject: workload
      path: charts/all/wordpress
    dr-monitoring:
      name: dr-monitoring
      namespace: openshift-monitoring
      argoProject: trident
      path: charts/all/dr-monitoring
      overrides:
        - name: drMonitoring.clusterRole
          value: hub
    boutique:
      name: boutique
      namespace: boutique
      chart: boutique
      chartVersion: 0.0.*
      argoProject: workload
      overrides:
        - name: global.storageClass
          value: storage-class-nfs
  imperative:
    # NOTE: We *must* use lists and not hashes. As hashes lose ordering once parsed by helm
    # The default schedule is every 10 minutes: imperative.schedule
    # Total timeout of all jobs is 1h: imperative.activeDeadlineSeconds
    # imagePullPolicy is set to always: imperative.imagePullPolicy
    # For additional overrides that apply to the jobs, please refer to
    # https://validatedpatterns.io/patterns/multicloud-gitops/mcg-imperative-actions/
    jobs:
      - name: hello-world
        # ansible playbook to be run
        playbook: rhvp.cluster_utils.hello_world
        # per playbook timeout in seconds
        timeout: 234
        # verbosity: "-v"
  managedClusterGroups:
    exampleRegion:
      name: secondary
      acmlabels:
        - name: clusterGroup
          value: secondary
# The hub cluster has the FSx ONTAP filesystem and S3 AppVault; these are not replicated to the
# DR cluster but can be used as sources for replication to other clusters in the pattern.
fsxOntap:
  enabled: true
  region: "ca-central-1" # Provided by crossplane-setup
  fileSystemName: "oa-trident-hub-ca-central-1-fsx" # Provided by crossplane-setup
  vpcId: "vpc-0e1655e00abcf0c7c" # Provided by crossplane-setup
  subnetIds:
    - subnet-0f836733fa33c402a
    - subnet-0be757f3f63a934d4
  routeTableIds:
    - rtb-07193e3a792545e29
    - rtb-0a06f25b4b41eae32
    - rtb-0b29e6e7d9530c44b
  preferredSubnetId: "subnet-0f836733fa33c402a" # Provided by crossplane-setup
  allowedCidrs:
    - 10.0.0.0/16
    - 10.0.0.0/16
  storageCapacity: 1024
  throughputCapacity: 1024
  storageType: SSD
  deploymentType: MULTI_AZ_1
  svmName: SVM1
  peer:
    enabled: true
    region: "us-east-1" # Provided by crossplane-setup
    fileSystemName: "oa-trident-spoke-us-east-1-fsx" # Provided by crossplane-setup
    vpcId: "vpc-064793b12045c30cd" # Provided by crossplane-setup
    subnetIds:
      - subnet-0ed529021d60e2e9a
      - subnet-0613552a52318807c
    routeTableIds:
      - rtb-0d975191f590ecfd2
      - rtb-019d693da2648ab7c
      - rtb-073cd0c5e139a0425
      - rtb-035f69af7b8bd8c1f
      - rtb-059a8daa880ff6436
      - rtb-03d2aeb63cdbffa20
    preferredSubnetId: "subnet-0ed529021d60e2e9a" # Provided by crossplane-setup
    allowedCidrs:
      - 10.0.0.0/16
      - 10.0.0.0/16
    svmName: SVM2
s3AppVault:
  enabled: true
  bucketName: "oa-trident-bucket" # Matches .Values.tridentProtect.appVault.name in values-global.yaml; provided by crossplane-setup
  region: "ca-central-1" # Provided by crossplane-setup
endpointWatcher:
  enabled: true
  local:
    fileSystemName: "oa-trident-hub-ca-central-1-fsx" # Provided by crossplane-setup
    region: "ca-central-1" # Provided by crossplane-setup
    svmName: SVM1
  peer:
    fileSystemName: "oa-trident-spoke-us-east-1-fsx" # Provided by crossplane-setup
    region: "us-east-1" # Provided by crossplane-setup
    svmName: SVM2
vpcPeering:
  enabled: true
  prod:
    region: "ca-central-1" # Provided by crossplane-setup
    vpcId: "vpc-0e1655e00abcf0c7c" # Provided by crossplane-setup
    vpcCidr: "10.0.0.0/16" # Provided by crossplane-setup
    clusterName: "oa-trident-hub" # Provided by crossplane-setup
    routeTableIds:
      - rtb-07193e3a792545e29
      - rtb-0a06f25b4b41eae32
      - rtb-0e5d907ef30a435c4
      - rtb-03dd5b1374aa8e6df
      - rtb-0b29e6e7d9530c44b
  dr:
    region: "us-east-1" # Provided by crossplane-setup
    vpcId: "vpc-064793b12045c30cd" # Provided by crossplane-setup
    vpcCidr: "10.0.0.0/16" # Provided by crossplane-setup
    clusterName: "oa-trident-spoke" # Provided by crossplane-setup
    routeTableIds:
      - rtb-0d975191f590ecfd2
      - rtb-019d693da2648ab7c
      - rtb-0273ccf363f864020
      - rtb-0482672e266e51b6f
      - rtb-073cd0c5e139a0425
      - rtb-035f69af7b8bd8c1f
      - rtb-059a8daa880ff6436
      - rtb-03d2aeb63cdbffa20
route53Failover:
  enabled: true
  perAppHealthChecks: false
  followPromotedDns:
    enabled: true
  # Omit secondary health check so DNS follows primary-down (AMR Failover) without
  # requiring a 2xx/3xx from the DR router on healthCheckPath. Set true to gate DR on probe success.
  attachSecondaryHealthCheck: false
  domain: dr.aws.validatedpatterns.io # Provided by crossplane-setup; auto-derived from cluster DNS if omitted
  # If false: set hostedZoneId to the Route53 zone ID for `domain` (see ansible dr_failover_hosted_zone_id or AWS console).
  # If true: Crossplane creates the zone; delegate NS at the parent registrar.
  createHostedZone: False
  hostedZoneId: "Z001281810MV5UN93UQKQ" # Provided by crossplane-setup or set to existing zone ID if createHostedZone is false
  # Router targets default to router-default.<domain> where templates now prefer:
  # global.localClusterDomain (primary) and global.drClusterDomain (secondary).
  # You can still override per environment with primaryIngressHostname/secondaryIngressHostname.
  healthCheckPath: /
  # Per-app primaryHealthCheckFqdn / secondaryHealthCheckFqdn are optional; these apply to all apps when omitted.
  apps:
    - name: boutique
    - name: wordpress
  region: ca-central-1
# Hub: weighted Route53 from S3 (dr-dns-state-export on DR). Requires IAM on aws-provider creds.
drDnsReconciler:
  enabled: true
  namespace: crossplane-system
  schedule: "*/1 * * * *"
  s3Bucket: trident-protect-bucket
  s3Region: us-west-1
  s3Key: dr-metadata/amr-dns-target.json
  hostedZoneId: "Z001281810MV5UN93UQKQ" # Provided by crossplane-setup or set to existing zone ID if createHostedZone is false
  domain: dr.aws.validatedpatterns.io # Provided by crossplane-setup; auto-derived from cluster DNS if omitted
  # PRIMARY_INGRESS/SECONDARY_INGRESS now default from:
  # global.localClusterDomain (preferred) + global.drClusterDomain.
  # You can override with primaryIngressHostname/secondaryIngressHostname if needed.
  recordTtl: 60
  apps:
    - name: boutique
    - name: wordpress
